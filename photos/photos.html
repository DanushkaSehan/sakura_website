<head>

    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Gallery — Sakura Japanese Language Center</title>
    <meta name="description"

    <link rel="icon" type="image/x-icon" href="titleimg.png">

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close"><i class="las la-times"></i></button>
        <div class="lightbox-nav">
            <button class="lb-btn" id="lb-prev"><i class="las la-chevron-left"></i></button>
            <img src="" alt="" id="lightbox-img">
            <button class="lb-btn" id="lb-next"><i class="las la-chevron-right"></i></button>
        </div>
        <div class="lb-counter" id="lb-counter"></div>
